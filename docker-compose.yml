name: indygestion

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

x-common-restart: &default-restart unless-stopped

networks:
  indygestion-net:
    name: indygestion-net
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  tusd-data:
  hf-cache:

services:
  # ── Reverse proxy: single entry point on port 80 ──
  nginx:
    image: nginx:stable-alpine
    container_name: indygestion-nginx
    restart: *default-restart
    ports:
      - "${APP_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
      - tusd
    networks:
      - indygestion-net
    logging: *default-logging
    mem_limit: 256m
    cpus: "0.50"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api/v1
        VITE_TUSD_ENDPOINT: /files/
    container_name: indygestion-frontend
    restart: *default-restart
    expose:
      - "80"
    networks:
      - indygestion-net
    logging: *default-logging
    mem_limit: 512m
    cpus: "1.00"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: indygestion-backend
    restart: *default-restart
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2
    environment:
      APP_ENV: ${APP_ENV}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND}
      TUSD_WEBHOOK_SECRET: ${TUSD_WEBHOOK_SECRET}
      MEDIA_ROOT: /media/indygestion
      WHISPER_SERVICE_URL: http://whisper:9000
    expose:
      - "8000"
    volumes:
      - ${MEDIA_ROOT_HOST}:/media/indygestion
      - /dev/dri:/dev/dri
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      whisper:
        condition: service_started
    networks:
      - indygestion-net
    logging: *default-logging
    mem_limit: 2g
    cpus: "2.00"

  tusd:
    image: tusproject/tusd:v2.6
    container_name: indygestion-tusd
    restart: *default-restart
    command:
      - -port=8080
      - -upload-dir=/data/uploads
      - -hooks-http=http://backend:8000/api/v1/upload/tusd/on-complete
      - -hooks-http-forward-headers=Authorization,Cookie,X-Request-Id,Tus-Resumable,Upload-Metadata
      - -hooks-enabled-events=post-finish
      - -behind-proxy
      - -base-path=/files/
    environment:
      TUSD_HOOKS_HTTP_HEADER_Authorization: "Bearer ${TUSD_WEBHOOK_SECRET}"
    expose:
      - "8080"
    volumes:
      - ${MEDIA_ROOT_HOST}/staging:/data/uploads
      - tusd-data:/data/tusd
    depends_on:
      backend:
        condition: service_started
    networks:
      - indygestion-net
    logging: *default-logging
    mem_limit: 1g
    cpus: "1.00"

  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: indygestion-worker
    restart: *default-restart
    command: celery -A celery_app worker --loglevel=INFO --concurrency=4 --max-tasks-per-child=100
    environment:
      APP_ENV: ${APP_ENV}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND}
      MEDIA_ROOT: /media/indygestion
      WHISPER_SERVICE_URL: http://whisper:9000
      FFMPEG_HWACCEL: qsv
    volumes:
      - ${MEDIA_ROOT_HOST}:/media/indygestion
      - /dev/dri:/dev/dri
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      whisper:
        condition: service_started
    devices:
      - /dev/dri:/dev/dri
    networks:
      - indygestion-net
    logging: *default-logging
    mem_limit: 4g
    cpus: "4.00"

  whisper:
    build:
      context: ./whisper
      dockerfile: Dockerfile
    container_name: indygestion-whisper
    restart: *default-restart
    command: uvicorn app:app --host 0.0.0.0 --port 9000 --workers 1
    environment:
      WHISPER_MODEL: ${WHISPER_MODEL}
      WHISPER_DEVICE: cpu
      TRANSFORMERS_CACHE: /models
      HF_HOME: /models
    expose:
      - "9000"
    volumes:
      - hf-cache:/models
      - ${MEDIA_ROOT_HOST}:/media/indygestion
    networks:
      - indygestion-net
    logging: *default-logging
    mem_limit: 4g
    cpus: "3.00"

  postgres:
    image: pgvector/pgvector:pg16
    container_name: indygestion-postgres
    restart: *default-restart
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PGDATA: /var/lib/postgresql/data/pgdata
    expose:
      - "5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - indygestion-net
    logging: *default-logging
    mem_limit: 2g
    cpus: "2.00"

  redis:
    image: redis:7.4-alpine
    container_name: indygestion-redis
    restart: *default-restart
    command: redis-server --appendonly yes --save 60 1000 --maxmemory 768mb --maxmemory-policy allkeys-lru
    expose:
      - "6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks:
      - indygestion-net
    logging: *default-logging
    mem_limit: 1g
    cpus: "1.00"

  device-watcher:
    build:
      context: ./device-watcher
      dockerfile: Dockerfile
    container_name: indygestion-device-watcher
    restart: *default-restart
    command: python -m app.main
    privileged: true
    environment:
      BACKEND_URL: http://backend:8000
      MEDIA_ROOT: /media/indygestion
      AUTO_INGEST: ${AUTO_INGEST}
      MIN_FILE_SIZE_MB: ${MIN_FILE_SIZE_MB}
      VIDEO_EXTENSIONS: ${VIDEO_EXTENSIONS}
    volumes:
      - ${MEDIA_ROOT_HOST}:/media/indygestion
      - /run/udev:/run/udev:ro
      - /dev:/dev
      - /dev/dri:/dev/dri
    depends_on:
      backend:
        condition: service_started
    networks:
      - indygestion-net
    logging: *default-logging
    mem_limit: 512m
    cpus: "0.75"
